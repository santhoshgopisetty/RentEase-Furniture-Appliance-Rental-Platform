name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Build Project
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://rentease-backend-se87.onrender.com/api # Replace with your actual Render backend URL if needed

      - name: Handle React Router Refresh (404 Fallback)
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages
